experiment_name: maze_baseline
output_root: task03/experiments

problem:
  start: [1, 1]
  goal: [10, 10]
  max_steps: 30
  target_steps: 20

fitness:
  success_bonus: 10000
  distance_weight: 35
  progress_weight: 60
  efficiency_weight: 12
  solved_step_penalty: 170
  invalid_move_penalty: 20
  revisit_penalty: 2
  stagnation_penalty: 20
  exploration_reward: 5

ga:
  num_generations: 320
  solutions_per_population: 120
  num_parents_mating: 40
  parent_selection_type: sss
  mutation_type: random
  mutation_num_genes: 1
  crossover_type: single_point
  keep_parents: 2

runs:
  num_runs: 10
  timing_runs: 10
  single_run_seed: 42
  seed_strategy: incremental
  base_seed: 42
  sweep_configs:
    - task03/configs/maze_small.yaml
    - task03/configs/maze_baseline.yaml
    - task03/configs/maze_large.yaml

gif:
  enabled: true
  ga_evolution: true
  astar_solving: true
  frame_duration_ms: 300
  ga_sample_every_n_generations: 4
  astar_sample_every_n_steps: 1
