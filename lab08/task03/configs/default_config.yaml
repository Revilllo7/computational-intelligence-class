experiment_name: default
output_root: task03/experiments

aco:
  ant_count: 300
  alpha: 0.5 # Pheromone importance
  beta: 1.2 # Distance/heuristic importance
  pheromone_evaporation_rate: 0.40
  pheromone_constant: 1000.0
  iterations: 250

pso:
  particle_count: 200
  iterations: 300
  sequence_length: 30
  lower_bound: -4.0
  upper_bound: 4.0
  velocity_clamp: 2.0
  c1: 0.8
  c2: 0.3
  w: 0.8
  step_weight: 1.0
  revisit_weight: 3.0
  goal_distance_weight: 5.0
  failure_penalty: 2000.0

plotting:
  enabled: true
  save_cost_plot: true
  figure_dpi: 120

gif:
  enabled: true
  aco_evolution: true
  pso_evolution: true
  frame_duration_ms: 100
